{% extends 'base.html' %}
{% block title %}Delete {{ object_type }} - Media Portal{% endblock %}

{% block content %}
<div style="max-width:500px;margin:2rem auto;">
    <div class="card">
        <div class="card-header" style="background:#C62828;color:#fff;">
            <h3 style="color:#fff;margin:0;font-size:1.1rem;"><i class="bi bi-exclamation-triangle"></i> Confirm Deletion</h3>
        </div>
        <div class="card-body" style="text-align:center;padding:2rem;">
            <p style="font-size:1rem;margin-bottom:.5rem;">Are you sure you want to delete this <strong>{{ object_type }}</strong>?</p>
            <p style="font-size:1.1rem;font-weight:700;color:#C62828;margin-bottom:1.5rem;">{{ object }}</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url back_url %}" class="btn btn-outline-secondary" style="margin-left:.5rem;">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
